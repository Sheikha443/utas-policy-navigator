<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { color-scheme: light; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: #FAF7F1; color: #20233A;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  button { font-family: inherit; }
  input, select, textarea { font-family: inherit; }
  ::selection { background: #FC842433; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-thumb { background: #D9D0BE; border-radius: 99px; border: 3px solid #FAF7F1; }
  ::-webkit-scrollbar-thumb:hover { background: #C9C0AE; }

  /* entrance */
  .fade-in { animation: fadeIn .42s cubic-bezier(.2,.7,.3,1) both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  /* ── scroll reveal ── */
  .reveal { opacity: 0; transform: translateY(26px); transition: opacity .7s cubic-bezier(.2,.7,.3,1), transform .7s cubic-bezier(.2,.7,.3,1); will-change: opacity, transform; }
  .reveal.in { opacity: 1; transform: none; }

  /* ── aurora drift (hero light) ── */
  @keyframes auroraA { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(8%,-6%) scale(1.18); } }
  @keyframes auroraB { 0%,100% { transform: translate(0,0) scale(1.1); } 50% { transform: translate(-9%,7%) scale(.92); } }
  .aurora-a { animation: auroraA 16s ease-in-out infinite; }
  .aurora-b { animation: auroraB 20s ease-in-out infinite; }

  /* ── floating geometry ── */
  @keyframes floatY { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-22px) rotate(4deg); } }
  @keyframes floatY2 { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(18px) rotate(-5deg); } }
  @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .float-a { animation: floatY 9s ease-in-out infinite; }
  .float-b { animation: floatY2 11s ease-in-out infinite; }
  .spin-slow { animation: spinSlow 42s linear infinite; }

  /* ── shimmer sweep on primary CTA ── */
  @keyframes shimmer { 0% { transform: translateX(-140%) skewX(-20deg); } 60%,100% { transform: translateX(260%) skewX(-20deg); } }
  .shine { position: relative; overflow: hidden; }
  .shine::after { content:""; position:absolute; inset:0; width:38%; background:linear-gradient(90deg,transparent,rgba(255,255,255,.42),transparent); transform:translateX(-140%) skewX(-20deg); animation: shimmer 4.5s ease-in-out 1.2s infinite; pointer-events:none; }

  /* ── pop in (hero content stagger) ── */
  @keyframes popUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform:none; } }
  .pop { opacity:0; animation: popUp .8s cubic-bezier(.2,.75,.3,1) forwards; }

  /* ── soft pulse dot ── */
  @keyframes pulseDot { 0%,100% { box-shadow:0 0 0 0 rgba(252,132,36,.55);} 50% { box-shadow:0 0 0 7px rgba(252,132,36,0);} }
  .pulse-dot { animation: pulseDot 2.4s ease-in-out infinite; }

  /* ── animated underline link feel ── */
  @keyframes drawLine { from { transform: scaleX(0); } to { transform: scaleX(1); } }

  /* ── nav / detector spinner ── */
  @keyframes spinNav { to { transform: rotate(360deg); } }

  /* ── typing dots (assistant) ── */
  .typing { display:inline-flex; gap:4px; align-items:center; height:18px; }
  .typing i { width:7px; height:7px; border-radius:99px; background:#7C8FD8; display:inline-block;
    animation: typingBounce 1.2s ease-in-out infinite; }
  .typing i:nth-child(2){ animation-delay:.18s; } .typing i:nth-child(3){ animation-delay:.36s; }
  @keyframes typingBounce { 0%,60%,100%{ transform:translateY(0); opacity:.4; } 30%{ transform:translateY(-5px); opacity:1; } }

  /* ── command center responsive ── */
  @media (max-width: 860px) {
    .cc-top { grid-template-columns: 1fr !important; }
    .cc-mid, .cc-bot { grid-template-columns: 1fr !important; }
  }

  @media (prefers-reduced-motion: reduce) {
    .fade-in, .pop { animation: none !important; opacity:1 !important; transform:none !important; }
    .aurora-a, .aurora-b, .float-a, .float-b, .spin-slow, .shine::after, .pulse-dot { animation: none !important; }
    .reveal { opacity:1 !important; transform:none !important; }
    * { transition: none !important; }
  }

  /* responsive nav */
  .navlabel { white-space: nowrap; }
  @media (max-width: 1080px) {
    .navlabel { display: none; }
  }
  @media (max-width: 720px) {
    .decl-grid { grid-template-columns: 1fr !important; }
    .decl-grid > div:first-child { position: static !important; }
    .auth-grid { grid-template-columns: 1fr !important; }
    .auth-promo { display: none !important; }
  }
  @media (max-width: 600px) {
    .dotlabel { display: none; }
  }
  @media (max-width: 520px) {
    .topnav { gap: 0 !important; }
  }
</style>
